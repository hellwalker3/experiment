<script>
/* ══════════════════════════════════════════
   FormantSynth v2 — 2オシレーター版
   ・osc1（鋸波）+ osc2（鋸波、+8 cents デチューン）でボカロらしい質感
   ・F1/F2/F3 バンドパス + 母音ランプ遷移
   ・destination = 生の AudioNode（Tone.Gain.input など）
   ══════════════════════════════════════════ */
class FormantSynth {
  static VOWELS = {
    'ア':[800,1200,2500], 'イ':[280,2700,3100],
    'ウ':[300, 900,2200], 'エ':[530,1840,2500], 'オ':[500,800,2500],
  };

  constructor(actx, destination, vol = 0.32) {
    this._actx = actx; this._vol = vol;

    this._env = actx.createGain(); this._env.gain.value = 0;
    this._env.connect(destination);

    // osc1: 基音
    this._osc1 = actx.createOscillator(); this._osc1.type = 'sawtooth';
    // osc2: +8 cents デチューンでボカロ感
    this._osc2 = actx.createOscillator(); this._osc2.type = 'sawtooth';
    this._osc2.detune.value = 8;

    // ビブラート (5.5 Hz ±3 Hz)
    this._lfo = actx.createOscillator(); this._lfo.frequency.value = 5.5;
    const lg = actx.createGain(); lg.gain.value = 3;
    this._lfo.connect(lg);
    lg.connect(this._osc1.frequency);
    lg.connect(this._osc2.frequency);
    this._lfo.start();

    // F1(Q=10) / F2(Q=16) / F3(Q=6)
    const Qvalues = [10, 16, 6];
    this._bpf = Qvalues.map(q => {
      const f = actx.createBiquadFilter(); f.type='bandpass'; f.Q.value=q; return f;
    });

    const lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=5000;
    const mix = actx.createGain(); mix.gain.value = 0.8;

    // 2オシレーター → フィルタバンク
    [this._osc1, this._osc2].forEach(o => {
      this._bpf.forEach(f => o.connect(f));
    });
    this._bpf.forEach(f => f.connect(mix));
    mix.connect(lp); lp.connect(this._env);

    this._osc1.start(); this._osc2.start();
    this._applyVowel('ア', 0);
  }

  _applyVowel(v, time) {
    const [f1,f2,f3] = FormantSynth.VOWELS[v] ?? FormantSynth.VOWELS['ア'];
    const ramp = time + 0.025; // 25ms でスムーズに遷移
    this._bpf[0].frequency.setValueAtTime(this._bpf[0].frequency.value, time);
    this._bpf[1].frequency.setValueAtTime(this._bpf[1].frequency.value, time);
    this._bpf[2].frequency.setValueAtTime(this._bpf[2].frequency.value, time);
    this._bpf[0].frequency.linearRampToValueAtTime(f1, ramp);
    this._bpf[1].frequency.linearRampToValueAtTime(f2, ramp);
    this._bpf[2].frequency.linearRampToValueAtTime(f3, ramp);
  }

  triggerAttackRelease(note, durStr, time, vowel='ア') {
    const freq = Tone.Frequency(note).toFrequency();
    const dur  = Tone.Time(durStr).toSeconds();
    const atk  = Math.min(0.04, dur * 0.15);
    const rel  = Math.min(0.07, dur * 0.2);

    this._osc1.frequency.setValueAtTime(freq, time);
    this._osc2.frequency.setValueAtTime(freq, time);
    this._applyVowel(vowel, time);

    this._env.gain.cancelScheduledValues(time);
    this._env.gain.setValueAtTime(0, time);
    this._env.gain.linearRampToValueAtTime(this._vol, time + atk);
    this._env.gain.setValueAtTime(this._vol * 0.82, time + dur - rel);
    this._env.gain.linearRampToValueAtTime(0, time + dur);
  }

  dispose() {
    [this._osc1, this._osc2, this._lfo].forEach(o => {
      try { o.stop(); o.disconnect(); } catch(e){}
    });
    try { this._env.disconnect(); } catch(e){}
  }
}

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */

  const [b, bt=0, s=0] = ev.time.split(':').map(Number);
  return { ...ev, time:`${b+bars}:${bt}:${s}` };
});

  {time:`${bar}:0:0`,note:root,dur:'8n'},

/* ══════════════════════════════════════════
   歌詞 / セクション
   ══════════════════════════════════════════ */

  {bar:0, label:'Verse 1',    chords:['D','A','Bm','G']},

  {bar:8, label:'Pre-Chorus', chords:['G','A','G','A']},

function updateChordDisplay(bar) {
  const sec = [...SECTIONS].reverse().find(s=>s.bar<=bar) ?? SECTIONS[0];
  const pos = bar - sec.bar;
  document.getElementById('section-label').textContent = sec.label;
  document.querySelectorAll('.cp').forEach((p,i)=>{
    p.textContent=sec.chords[i]??''; p.classList.toggle('active',i===pos);
  });
}

/* ══════════════════════════════════════════
   オーディオグラフ（async）
   ══════════════════════════════════════════ */
const LOOP_END = '16m';
const TRACKS   = ['vocal','piano','violin','bass','sub','drum'];
const muteState = Object.fromEntries(TRACKS.map(t=>[t,false]));
const flashLvl  = Object.fromEntries(TRACKS.map(t=>[t,0]));

let synths={}, parts=[], fftAna=null, playing=false, rafId;
let lyricTimes=[], loopSec=0;

function setStatus(msg) { document.getElementById('status').textContent=msg; }

async function buildAudio() {
  const actx = Tone.getContext().rawContext;

  // マスターバス
  const comp  = new Tone.Compressor({threshold:-16,ratio:4,attack:0.003,release:0.1});
  const limit = new Tone.Limiter(-1);
  comp.chain(limit, Tone.getDestination());
  fftAna = new Tone.Analyser('fft',32); limit.connect(fftAna);

  // センドバス（Reverb IR を並列生成）
  setStatus('リバーブ生成中...');
  const [room, hall, sht] = await Promise.all([
    new Tone.Reverb({decay:1.8, wet:0.20}).generate(),
    new Tone.Reverb({decay:4.0, wet:0.28}).generate(),
    new Tone.Reverb({decay:0.4, wet:0.16}).generate(),
  ]);
  room.connect(comp); hall.connect(comp); sht.connect(comp);

  // ── ボカロ ──
  const vGain = new Tone.Gain(1.0).connect(room);
  synths.vocal = new FormantSynth(actx, vGain.input);

  // ── ピアノ（Salamander サンプラー）──
  setStatus('ピアノ読込中...');
  const pianoRev = new Tone.Reverb({decay:1.5, wet:0.15});
  await pianoRev.generate();
  pianoRev.connect(comp);
  synths.piano = new Tone.Sampler({
    urls: {
      'A3':'A3.mp3','C4':'C4.mp3','D#4':'Ds4.mp3',
      'F#4':'Fs4.mp3','A4':'A4.mp3','C5':'C5.mp3',
      'D#5':'Ds5.mp3','F#5':'Fs5.mp3','A5':'A5.mp3',
    },
    release: 1.2,
    baseUrl: 'https://tonejs.github.io/audio/salamander/',
  }).connect(pianoRev);
  await Tone.loaded(); // サンプル読み込み完了まで待機

  // ── バイオリン（弓弦: fatsawtooth + HP + EQ + Vibrato）──
  // fatsawtooth = 3本わずかにデチューンした鋸波 → 弦楽アンサンブル感
  const vlnVibrato = new Tone.Vibrato({frequency:5.8, depth:0.05, wet:0.7}).connect(hall);
  const vlnChorus  = new Tone.Chorus({frequency:2.5, delayTime:4, depth:0.35, wet:0.45}).start().connect(vlnVibrato);
  const vlnHP      = new Tone.Filter({frequency:220, type:'highpass', rolloff:-12}).connect(vlnChorus);
  // 2kHz あたりにプレゼンス（バイオリンの煌めき）
  const vlnEQ = new Tone.EQ3({low:-4, mid:3, high:2, lowFrequency:500, highFrequency:2200}).connect(vlnHP);
  synths.violin = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type:'fatsawtooth', count:3, spread:25 },
    envelope: { attack:0.18, decay:0, sustain:1, release:1.4 },
    volume: -11,
  }).connect(vlnEQ);

  // ── コードパッド（薄く）──
  synths.pad = new Tone.PolySynth(Tone.Synth, {
    oscillator:{type:'sine'}, envelope:{attack:0.2,decay:0.3,sustain:0.5,release:1.5}, volume:-16,
  }).connect(hall);

  // ── ベース ──
  synths.bass = new Tone.MonoSynth({
    oscillator:{type:'sawtooth'},
    filter:{frequency:400,type:'lowpass',rolloff:-24},
    filterEnvelope:{attack:0.01,decay:0.1,sustain:0.4,release:0.2,baseFrequency:200,octaves:2.5},
    envelope:{attack:0.01,decay:0.12,sustain:0.55,release:0.25},
    volume:-5,
  }).connect(comp);

  // ── サブベース ──
  synths.sub = new Tone.Synth({
    oscillator:{type:'sine'}, envelope:{attack:0.06,decay:0.3,sustain:0.7,release:0.6}, volume:-7,
  }).connect(comp);

  // ── ドラムキット ──
  const kComp = new Tone.Compressor({threshold:-12,ratio:6}).connect(comp);
  synths.kick  = new Tone.MembraneSynth({pitchDecay:0.06,octaves:7,
    envelope:{attack:0.001,decay:0.36,sustain:0,release:0.12},volume:1}).connect(kComp);
  synths.snare = new Tone.NoiseSynth({noise:{type:'white'},
    envelope:{attack:0.001,decay:0.14,sustain:0,release:0.06},volume:-5}).connect(sht);
  synths.ghost = new Tone.NoiseSynth({noise:{type:'white'},
    envelope:{attack:0.001,decay:0.06,sustain:0,release:0.03},volume:-16}).connect(sht);
  synths.hat   = new Tone.MetalSynth({frequency:400,harmonicity:5.1,modulationIndex:32,
    resonance:4200,octaves:1.5,envelope:{attack:0.001,decay:0.03,release:0.01},volume:-17}).connect(comp);
  synths.ohat  = new Tone.MetalSynth({frequency:400,harmonicity:5.1,modulationIndex:32,
    resonance:4200,octaves:1.5,envelope:{attack:0.001,decay:0.20,release:0.06},volume:-18}).connect(sht);
  synths.crash = new Tone.MetalSynth({frequency:300,harmonicity:5.1,modulationIndex:32,
    resonance:3800,octaves:1.5,envelope:{attack:0.001,decay:1.8,release:0.6},volume:-14}).connect(room);
}

function disposeSynths() {
  if (synths.vocal) { synths.vocal.dispose(); }
  Object.entries(synths).forEach(([k,s])=>{ if(k==='vocal')return; try{s.dispose?.();}catch(e){} });
  synths={};
  parts.forEach(p=>{ try{p.dispose?.();}catch(e){} }); parts=[];
  if(fftAna){try{fftAna.dispose();}catch(e){} fftAna=null;}
}

/* ══════════════════════════════════════════
   リズムパターン（新）
   ── 16分ハイハット全打ち + シンコペーションキック
   ── キック: 0(拍1), 6(and 2.5 シンコペ), 8(拍3), 15(拍4 後半先取り)
   ── スネア: 4(拍2), 12(拍4)  + ゴーストスネア: 9, 14
   ── ハイハット: 全16ステップ(閉)、6/14でオープン
   ── コーラス開始(bar12)でクラッシュ
   ══════════════════════════════════════════ */
const KICK_STEPS  = new Set([0, 6, 8, 15]);
const SNARE_STEPS = new Set([4, 12]);
const GHOST_STEPS = new Set([9, 14]);
const OPEN_STEPS  = new Set([6, 14]);

/* ══════════════════════════════════════════
   パート構築
   ══════════════════════════════════════════ */
function makePart(events, fn) {
  const p = new Tone.Part(fn, events);
  p.loop=true; p.loopEnd=LOOP_END; p.start(0); parts.push(p);
}

function buildParts() {
  makePart(VOCAL, (time,ev)=>{
    if(muteState.vocal) return;
    synths.vocal.triggerAttackRelease(ev.note,ev.dur,time,ev.vowel);
    Tone.getDraw().schedule(()=>{flashLvl.vocal=1;},time);
  });

  makePart(MELODY, (time,ev)=>{
    if(muteState.piano) return;
    synths.piano.triggerAttackRelease(ev.note,ev.dur,time);
    Tone.getDraw().schedule(()=>{flashLvl.piano=1;},time);
  });

  makePart(STRINGS, (time,ev)=>{
    if(muteState.violin) return;
    synths.violin.triggerAttackRelease(ev.notes,ev.dur,time);
    Tone.getDraw().schedule(()=>{flashLvl.violin=0.9;},time);
  });

  makePart(CHORDS, (time,ev)=>{ synths.pad.triggerAttackRelease(ev.notes,'2n.',time); });

  makePart(BASS, (time,ev)=>{
    if(muteState.bass) return;
    synths.bass.triggerAttackRelease(ev.note,ev.dur,time);
    Tone.getDraw().schedule(()=>{flashLvl.bass=0.85;},time);
  });

  makePart(SUB, (time,ev)=>{
    if(muteState.sub) return;
    synths.sub.triggerAttackRelease(ev.note,ev.dur,time);
    Tone.getDraw().schedule(()=>{flashLvl.sub=0.7;},time);
  });

  // ドラム
  const drumSeq = new Tone.Sequence((time,step)=>{
    if(muteState.drum) return;
    if(KICK_STEPS.has(step))  synths.kick.triggerAttackRelease('C1','8n',time);
    if(SNARE_STEPS.has(step)) synths.snare.triggerAttackRelease('8n',time);
    if(GHOST_STEPS.has(step)) synths.ghost.triggerAttackRelease('8n',time);
    if(OPEN_STEPS.has(step))  synths.ohat.triggerAttackRelease('16n',time);
    else                      synths.hat.triggerAttackRelease('32n',time);
    if(KICK_STEPS.has(step)||SNARE_STEPS.has(step))
      Tone.getDraw().schedule(()=>{flashLvl.drum=1;},time);
  }, [...Array(16).keys()], '16n');
  drumSeq.start(0); parts.push(drumSeq);

  // コーラス先頭でクラッシュ
  const crashPart = new Tone.Part((time)=>{
    if(muteState.drum) return;
    synths.crash.triggerAttackRelease('C5','1m',time);
  },[{time:'12:0:0'},{time:'0:0:0'}]); // ループ先頭にも（再ループ時）
  crashPart.loop=true; crashPart.loopEnd=LOOP_END; crashPart.start(0); parts.push(crashPart);

  // コード/セクション表示（小節単位）
  const cpPart = new Tone.Part((time,ev)=>{
    Tone.getDraw().schedule(()=>updateChordDisplay(ev.bar),time);
  }, ROOT_MAP.map(([bar])=>({time:`${bar}:0:0`,bar})));
  cpPart.loop=true; cpPart.loopEnd=LOOP_END; cpPart.start(0); parts.push(cpPart);
}

/* ══════════════════════════════════════════
   再生 / 停止
   ══════════════════════════════════════════ */
async function startPlayback() {
  if(playing) return;
  await Tone.start();
  const btn=document.getElementById('btn-play');
  btn.textContent='読込中...'; btn.style.opacity='0.5';

  Tone.Transport.bpm.value=parseInt(document.getElementById('sl-bpm').value);
  Tone.Transport.loop=true; Tone.Transport.loopStart=0; Tone.Transport.loopEnd=LOOP_END;

  await buildAudio();

  loopSec=Tone.Time(LOOP_END).toSeconds();
  lyricTimes=LYRICS.map(l=>Tone.Time(l.time).toSeconds());

  buildParts();
  Tone.Transport.start();
  playing=true;
  btn.textContent='▶ 再生'; btn.style.opacity='0.45';
  setStatus('再生中 ▶');
  tick();
}

function stopPlayback() {
  if(!playing) return;
  playing=false; cancelAnimationFrame(rafId);
  Tone.Transport.stop(); Tone.Transport.cancel();
  disposeSynths();
  document.getElementById('section-label').textContent='—';
  document.querySelectorAll('.cp').forEach(p=>p.classList.remove('active'));
  document.getElementById('prog').style.width='0%';
  const btn=document.getElementById('btn-play');
  btn.textContent='▶ 再生'; btn.style.opacity='1';
  setStatus('停止中');
  document.getElementById('ly-curr').textContent='♪';
  document.getElementById('ly-prev').textContent='';
  document.getElementById('ly-next').textContent='';
  vizBars.forEach(b=>b.style.height='2px');
  TRACKS.forEach(t=>{flashLvl[t]=0;});
  updateChordDisplay(0);
}

/* ══════════════════════════════════════════
   アニメーション
   ══════════════════════════════════════════ */
function tick() {
  if(!playing) return;
  rafId=requestAnimationFrame(tick);

  const pos=Tone.Transport.seconds%loopSec;
  document.getElementById('prog').style.width=(pos/loopSec*100)+'%';

  // 歌詞スライド（前 | 現在 | 次）
  let cur=-1;
  for(let i=0;i<lyricTimes.length;i++){
    if(pos>=lyricTimes[i]&&pos<(lyricTimes[i+1]??loopSec)){cur=i;break;}
  }
  document.getElementById('ly-prev').textContent=cur>0?LYRICS[cur-1].w:'';
  document.getElementById('ly-curr').textContent=cur>=0?LYRICS[cur].w:'♪';
  document.getElementById('ly-next').textContent=cur>=0&&cur<LYRICS.length-1?LYRICS[cur+1].w:'';

  // FFT
  if(fftAna){
    const vals=fftAna.getValue();
    vizBars.forEach((b,i)=>{
      if(i>=vals.length)return;
      const n=isFinite(vals[i])?Math.max(0,Math.min(1,(vals[i]+80)/80)):0;
      b.style.height=(2+n*70)+'px';
      b.style.background=`rgb(${Math.round(18+n*237)},${Math.round(18+n*92)},${Math.round(42+n*138)})`;
    });
  }

  // メーター
  const mids={vocal:'mv-vocal',piano:'mv-piano',violin:'mv-vln',bass:'mv-bass',sub:'mv-sub',drum:'mv-drum'};
  TRACKS.forEach(t=>{
    flashLvl[t]=Math.max(0,flashLvl[t]-0.04);
    const el=document.getElementById(mids[t]);
    if(el) el.style.height=(flashLvl[t]*100)+'%';
  });
}

/* ══════════════════════════════════════════
   UI
   ══════════════════════════════════════════ */
const vizEl=document.getElementById('viz'), vizBars=[];
for(let i=0;i<32;i++){
  const b=document.createElement('div'); b.className='vbar'; b.style.height='2px';
  vizEl.appendChild(b); vizBars.push(b);
}

(function(){
  const wrap=document.getElementById('mutes');
  const lbls={vocal:'Vocal',piano:'Piano',violin:'Violin',bass:'Bass',sub:'Sub',drum:'Drum'};
  TRACKS.forEach(t=>{
    const btn=document.createElement('button'); btn.className='mb on'; btn.textContent=lbls[t];
    btn.addEventListener('click',()=>{ muteState[t]=!muteState[t]; btn.classList.toggle('on',!muteState[t]); });
    wrap.appendChild(btn);
  });
})();

document.getElementById('btn-play').addEventListener('click', startPlayback);
document.getElementById('btn-stop').addEventListener('click', stopPlayback);
document.getElementById('sl-bpm').addEventListener('input', function(){
  document.getElementById('bpm-val').textContent=this.value;
  if(playing) Tone.Transport.bpm.value=parseInt(this.value);
});

updateChordDisplay(0);
</script>
