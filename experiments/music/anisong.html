/* ══════════════════════════════════════════
   FormantSynth — 母音フォルマント合成（ボカロ声）
   鋸波 → F1/F2/F3 バンドパスフィルタ → ゲインエンベロープ
   ══════════════════════════════════════════ */
class FormantSynth {
  // 日本語母音の代表フォルマント周波数 [F1, F2, F3] Hz
  static VOWELS = {
    'ア': [800, 1200, 2500],
    'イ': [280, 2700, 3100],
    'ウ': [300,  900, 2200],
    'エ': [530, 1840, 2500],
    'オ': [500,  800, 2500],
  };

  // destination は生の AudioNode (例: Tone.Gain.input)
  constructor(actx, destination, vol = 0.2) {
    this._actx = actx;
    this._vol  = vol;

    // 出力エンベロープゲイン
    this._env = actx.createGain();
    this._env.gain.value = 0;
    this._env.connect(destination);

    // 声帯源: 鋸波（倍音豊富）
    this._osc = actx.createOscillator();
    this._osc.type = 'sawtooth';

    // 自然なビブラート (±3 Hz, 5.5 Hz)
    this._lfo = actx.createOscillator();
    this._lfo.frequency.value = 5.5;
    const lfoGain = actx.createGain();
    lfoGain.gain.value = 3;
    this._lfo.connect(lfoGain);
    lfoGain.connect(this._osc.frequency);
    this._lfo.start();

    // F1/F2/F3 バンドパスフィルタ
    this._bpf = [0, 1, 2].map(() => {
      const f = actx.createBiquadFilter();
      f.type  = 'bandpass';
      f.Q.value = 14;
      return f;
    });

    // 高域ロールオフ
    this._lp = actx.createBiquadFilter();
    this._lp.type = 'lowpass';
    this._lp.frequency.value = 4000;

    const mix = actx.createGain();
    mix.gain.value = 0.85;
    this._bpf.forEach(f => { this._osc.connect(f); f.connect(mix); });
    mix.connect(this._lp);
    this._lp.connect(this._env);

    this._osc.start();
    this._applyVowel('ア', 0);
  }

  _applyVowel(v, time) {
    const [f1, f2, f3] = FormantSynth.VOWELS[v] ?? FormantSynth.VOWELS['ア'];
    this._bpf[0].frequency.setValueAtTime(f1, time);
    this._bpf[1].frequency.setValueAtTime(f2, time);
    this._bpf[2].frequency.setValueAtTime(f3, time);
  }

  triggerAttackRelease(note, durStr, time, vowel = 'ア') {
    const freq = Tone.Frequency(note).toFrequency();
    const dur  = Tone.Time(durStr).toSeconds();
    const atk  = Math.min(0.04, dur * 0.15);
    const rel  = Math.min(0.07, dur * 0.2);

    this._osc.frequency.setValueAtTime(freq, time);
    this._applyVowel(vowel, time);

    this._env.gain.cancelScheduledValues(time);
    this._env.gain.setValueAtTime(0, time);
    this._env.gain.linearRampToValueAtTime(this._vol, time + atk);
    this._env.gain.setValueAtTime(this._vol * 0.82, time + dur - rel);
    this._env.gain.linearRampToValueAtTime(0, time + dur);
  }

  dispose() {
    try { this._osc.stop(); this._osc.disconnect(); } catch(e) {}
    try { this._lfo.stop(); this._lfo.disconnect(); } catch(e) {}
    try { this._env.disconnect(); } catch(e) {}
  }
}

/* ══════════════════════════════════════════
   オーディオグラフ（非同期 — Reverb の IR 生成を待つ）
   ══════════════════════════════════════════ */
const TRACKS   = ['vocal','lead','strings','bass','sub','drum'];
const muteState = Object.fromEntries(TRACKS.map(t => [t, false]));
const flashLvl  = Object.fromEntries(TRACKS.map(t => [t, 0]));

let synths = {}, parts = [], fftAna = null, playing = false, rafId;

async function buildAudio() {
  const actx = Tone.getContext().rawContext;

  // ── マスターバス ──
  const comp  = new Tone.Compressor({ threshold: -18, ratio: 4, attack: 0.003, release: 0.1 });
  const limit = new Tone.Limiter(-1);
  comp.chain(limit, Tone.getDestination());

  // FFT アナライザ（マスターからタップ）
  fftAna = new Tone.Analyser('fft', 32);
  limit.connect(fftAna);

  // ── センドバス（IR 生成を並列 await）──
  const [room, hall, sht] = await Promise.all([
    new Tone.Reverb({ decay: 1.8, wet: 0.22 }).generate(),
    new Tone.Reverb({ decay: 3.5, wet: 0.30 }).generate(),
    new Tone.Reverb({ decay: 0.5, wet: 0.18 }).generate(),
  ]);
  room.connect(comp);
  hall.connect(comp);
  sht.connect(comp);

  // ── ボカロ（FormantSynth）──
  // Tone.Gain.input は生の GainNode → FormantSynth の Web Audio 接続先として使える
  const vGain = new Tone.Gain(0.9).connect(room);
  synths.vocal = new FormantSynth(actx, vGain.input);

  // ── FMリードシンセ ──
  const ldDly = new Tone.FeedbackDelay({ delayTime: '8n', feedback: 0.26, wet: 0.22 }).connect(room);
  synths.lead = new Tone.FMSynth({
    harmonicity: 3.5, modulationIndex: 14,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.01, decay: 0.08, sustain: 0.6, release: 0.35 },
    modulation: { type: 'square' },
    modulationEnvelope: { attack: 0.01, decay: 0.18, sustain: 0.25, release: 0.1 },
    volume: -5,
  }).connect(ldDly);

  // ── ストリングス（AMSynth + Vibrato + Chorus）──
  const vibrato = new Tone.Vibrato({ frequency: 5.2, depth: 0.06, wet: 0.8 }).connect(hall);
  const chorus  = new Tone.Chorus({ frequency: 3, delayTime: 3.5, depth: 0.4, wet: 0.5 }).start().connect(vibrato);
  synths.strings = new Tone.PolySynth(Tone.AMSynth, {
    harmonicity: 1.5,
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.25, decay: 0.1, sustain: 0.75, release: 1.8 },
    modulation: { type: 'sine' },
    modulationEnvelope: { attack: 0.4, decay: 0, sustain: 1, release: 0.5 },
    volume: -10,
  }).connect(chorus);

  // ── コードパッド ──
  synths.pad = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 0.2, decay: 0.3, sustain: 0.5, release: 1.5 },
    volume: -14,
  }).connect(hall);

  // ── ミッドベース ──
  synths.bass = new Tone.MonoSynth({
    oscillator: { type: 'sawtooth' },
    filter: { frequency: 400, type: 'lowpass', rolloff: -24 },
    filterEnvelope: { attack: 0.01, decay: 0.1, sustain: 0.4, release: 0.2, baseFrequency: 200, octaves: 2.5 },
    envelope: { attack: 0.01, decay: 0.12, sustain: 0.55, release: 0.25 },
    volume: -5,
  }).connect(comp);

  // ── サブベース（サイン波で重低音）──
  synths.sub = new Tone.Synth({
    oscillator: { type: 'sine' },
    envelope: { attack: 0.06, decay: 0.3, sustain: 0.7, release: 0.6 },
    volume: -7,
  }).connect(comp);

  // ── ドラムキット ──
  const kComp = new Tone.Compressor({ threshold: -12, ratio: 6 }).connect(comp);
  synths.kick = new Tone.MembraneSynth({
    pitchDecay: 0.06, octaves: 7,
    envelope: { attack: 0.001, decay: 0.36, sustain: 0, release: 0.12 },
    volume: 1,
  }).connect(kComp);
  synths.snare = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.14, sustain: 0, release: 0.06 },
    volume: -6,
  }).connect(sht);
  synths.hat = new Tone.MetalSynth({
    frequency: 400, harmonicity: 5.1, modulationIndex: 32, resonance: 4200, octaves: 1.5,
    envelope: { attack: 0.001, decay: 0.04, release: 0.01 }, volume: -16,
  }).connect(comp);
  synths.ohat = new Tone.MetalSynth({
    frequency: 400, harmonicity: 5.1, modulationIndex: 32, resonance: 4200, octaves: 1.5,
    envelope: { attack: 0.001, decay: 0.22, release: 0.06 }, volume: -18,
  }).connect(sht);
}

function disposeSynths() {
  if (synths.vocal) { synths.vocal.dispose(); }
  Object.entries(synths).forEach(([k, s]) => {
    if (k === 'vocal') return;
    try { s.dispose?.(); } catch(e) {}
  });
  synths = {};
  parts.forEach(p => { try { p.dispose?.(); } catch(e) {} });
  parts = [];
  if (fftAna) { try { fftAna.dispose(); } catch(e) {} fftAna = null; }
}

/* ══════════════════════════════════════════
   パート構築
   ══════════════════════════════════════════ */
function makePart(events, fn) {
  const p = new Tone.Part(fn, events);
  p.loop = true; p.loopEnd = LOOP_END; p.start(0);
  parts.push(p);
}

function flash(track) {
  Tone.getDraw().schedule(() => { flashLvl[track] = 1; }, Tone.now());
}

function buildParts() {
  makePart(VOCAL, (time, ev) => {
    if (muteState.vocal) return;
    synths.vocal.triggerAttackRelease(ev.note, ev.dur, time, ev.vowel);
    Tone.getDraw().schedule(() => { flashLvl.vocal = 1; }, time);
  });

  makePart(MELODY, (time, ev) => {
    if (muteState.lead) return;
    synths.lead.triggerAttackRelease(ev.note, ev.dur, time);
    Tone.getDraw().schedule(() => { flashLvl.lead = 1; }, time);
  });

  makePart(STRINGS, (time, ev) => {
    if (muteState.strings) return;
    synths.strings.triggerAttackRelease(ev.notes, ev.dur, time);
    Tone.getDraw().schedule(() => { flashLvl.strings = 1; }, time);
  });

  makePart(CHORDS, (time, ev) => {
    synths.pad.triggerAttackRelease(ev.notes, '2n.', time);
  });

  makePart(BASS, (time, ev) => {
    if (muteState.bass) return;
    synths.bass.triggerAttackRelease(ev.note, ev.dur, time);
    Tone.getDraw().schedule(() => { flashLvl.bass = 0.9; }, time);
  });

  makePart(SUB, (time, ev) => {
    if (muteState.sub) return;
    synths.sub.triggerAttackRelease(ev.note, ev.dur, time);
    Tone.getDraw().schedule(() => { flashLvl.sub = 0.7; }, time);
  });

  // ドラム（16ステップ）
  const drumSeq = new Tone.Sequence((time, step) => {
    if (muteState.drum) return;
    if ([0, 8].includes(step))  synths.kick.triggerAttackRelease('C1', '8n', time);
    if ([4, 12].includes(step)) synths.snare.triggerAttackRelease('8n', time);
    if ([6, 14].includes(step)) synths.ohat.triggerAttackRelease('16n', time);
    else if (step % 2 === 0)    synths.hat.triggerAttackRelease('32n', time);
    if (step === 9) synths.snare.triggerAttackRelease('32n', time); // ghost
    if ([0, 4, 8, 12].includes(step)) Tone.getDraw().schedule(() => { flashLvl.drum = 1; }, time);
  }, [...Array(16).keys()], '16n');
  drumSeq.start(0);
  parts.push(drumSeq);

  // コード表示
  const cpPart = new Tone.Part((time, ev) => {
    Tone.getDraw().schedule(() => {
      document.querySelectorAll('.cp').forEach(p => p.classList.remove('active'));
      document.getElementById('cp-' + ev.i)?.classList.add('active');
    }, time);
  }, [{time:'0:0:0',i:0},{time:'1:0:0',i:1},{time:'2:0:0',i:2},{time:'3:0:0',i:3}]);
  cpPart.loop = true; cpPart.loopEnd = LOOP_END; cpPart.start(0);
  parts.push(cpPart);
}

/* ══════════════════════════════════════════
   再生 / 停止
   ══════════════════════════════════════════ */
async function startPlayback() {
  if (playing) return;
  await Tone.start();

  const btn = document.getElementById('btn-play');
  btn.textContent = '生成中...';
  btn.style.opacity = '0.5';
  document.getElementById('status').textContent = 'リバーブ生成中...';

  Tone.Transport.bpm.value = parseInt(document.getElementById('sl-bpm').value);
  Tone.Transport.loop      = true;
  Tone.Transport.loopStart = 0;
  Tone.Transport.loopEnd   = LOOP_END;

  await buildAudio();
  buildParts();

  Tone.Transport.start();
  playing = true;
  btn.textContent = '▶ 再生';
  btn.style.opacity = '0.45';
  document.getElementById('status').textContent = '再生中 ▶';
  tick();
}

function stopPlayback() {
  if (!playing) return;
  playing = false;
  cancelAnimationFrame(rafId);
  Tone.Transport.stop();
  Tone.Transport.cancel();
  disposeSynths();
  document.querySelectorAll('.cp').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.lw').forEach(p => p.classList.remove('lit'));
  document.getElementById('prog').style.width = '0%';
  document.getElementById('btn-play').style.opacity = '1';
  document.getElementById('btn-play').textContent = '▶ 再生';
  document.getElementById('status').textContent = '停止中';
  vizBars.forEach(b => b.style.height = '2px');
  TRACKS.forEach(t => { flashLvl[t] = 0; });
}

/* ══════════════════════════════════════════
   アニメーションループ
   ══════════════════════════════════════════ */
function tick() {
  if (!playing) return;
  rafId = requestAnimationFrame(tick);

  const loopSec = Tone.Time(LOOP_END).toSeconds();
  const pos     = Tone.Transport.seconds % loopSec;

  // プログレスバー
  document.getElementById('prog').style.width = (pos / loopSec * 100) + '%';

  // 歌詞ハイライト
  const ltimes = LYRICS.map(l => Tone.Time(l.time).toSeconds());
  LYRICS.forEach((l, i) => {
    const s = ltimes[i], e = ltimes[i + 1] ?? loopSec;
    document.getElementById('lw' + i)?.classList.toggle('lit', pos >= s && pos < e);
  });

  // FFT ビジュアライザ
  if (fftAna) {
    const vals = fftAna.getValue();
    vizBars.forEach((b, i) => {
      if (i >= vals.length) return;
      const db   = vals[i];
      const norm = isFinite(db) ? Math.max(0, Math.min(1, (db + 80) / 80)) : 0;
      b.style.height = (2 + norm * 70) + 'px';
      const r  = Math.round(18  + norm * 237);
      const g  = Math.round(18  + norm * 92);
      const bl = Math.round(42  + norm * 138);
      b.style.background = `rgb(${r},${g},${bl})`;
    });
  }

  // トラックメーター（トリガー起点フラッシュ + 減衰）
  const meterIds = {vocal:'mv-vocal', lead:'mv-lead', strings:'mv-str', bass:'mv-bass', sub:'mv-sub', drum:'mv-drum'};
  TRACKS.forEach(t => {
    flashLvl[t] = Math.max(0, flashLvl[t] - 0.04);
    const el = document.getElementById(meterIds[t]);
    if (el) el.style.height = (flashLvl[t] * 100) + '%';
  });
}

/* ══════════════════════════════════════════
   UI 構築
   ══════════════════════════════════════════ */

// FFT バー
const vizEl   = document.getElementById('viz');
const vizBars = [];
for (let i = 0; i < 32; i++) {
  const b = document.createElement('div');
  b.className = 'vbar'; b.style.height = '2px';
  vizEl.appendChild(b); vizBars.push(b);
}

// 歌詞
(function() {
  const el = document.getElementById('lyrics');
  LYRICS.forEach((l, i) => {
    const s = document.createElement('span');
    s.className = 'lw'; s.id = 'lw' + i; s.textContent = l.w;
    el.appendChild(s);
  });
})();

// ミュートボタン
(function() {
  const wrap   = document.getElementById('mutes');
  const labels = {vocal:'Vocal', lead:'Lead', strings:'Strings', bass:'Bass', sub:'Sub', drum:'Drum'};
  TRACKS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'mb on';
    btn.textContent = labels[t];
    btn.addEventListener('click', () => {
      muteState[t] = !muteState[t];
      btn.classList.toggle('on', !muteState[t]);
    });
    wrap.appendChild(btn);
  });
})();

document.getElementById('btn-play').addEventListener('click', startPlayback);
document.getElementById('btn-stop').addEventListener('click', stopPlayback);
document.getElementById('sl-bpm').addEventListener('input', function() {
  document.getElementById('bpm-val').textContent = this.value;
  if (playing) Tone.Transport.bpm.value = parseInt(this.value);
});
</script>
</body>
