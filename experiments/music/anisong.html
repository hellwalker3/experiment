<script>
/* ══════════════════════════════════════════
   FormantSynth
   鋸波 → F1/F2/F3 バンドパス → ゲインエンベロープ
   destination = 生の AudioNode (Tone.Gain.input など)
   ══════════════════════════════════════════ */
class FormantSynth {
  static VOWELS = {
    'ア': [800,1200,2500], 'イ': [280,2700,3100],
    'ウ': [300, 900,2200], 'エ': [530,1840,2500], 'オ': [500,800,2500],
  };
  constructor(actx, destination, vol = 0.2) {
    this._actx = actx; this._vol = vol;
    this._env = actx.createGain(); this._env.gain.value = 0;
    this._env.connect(destination);
    this._osc = actx.createOscillator(); this._osc.type = 'sawtooth';
    // ビブラート LFO
    this._lfo = actx.createOscillator(); this._lfo.frequency.value = 5.5;
    const lg = actx.createGain(); lg.gain.value = 3;
    this._lfo.connect(lg); lg.connect(this._osc.frequency); this._lfo.start();
    // F1/F2/F3 バンドパス
    this._bpf = [0,1,2].map(() => { const f = actx.createBiquadFilter(); f.type='bandpass'; f.Q.value=14; return f; });
    const lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=4000;
    const mix = actx.createGain(); mix.gain.value = 0.85;
    this._bpf.forEach(f => { this._osc.connect(f); f.connect(mix); });
    mix.connect(lp); lp.connect(this._env);
    this._osc.start(); this._applyVowel('ア', 0);
  }
  _applyVowel(v, t) {
    const [f1,f2,f3] = FormantSynth.VOWELS[v] ?? FormantSynth.VOWELS['ア'];
    this._bpf[0].frequency.setValueAtTime(f1,t);
    this._bpf[1].frequency.setValueAtTime(f2,t);
    this._bpf[2].frequency.setValueAtTime(f3,t);
  }
  triggerAttackRelease(note, durStr, time, vowel='ア') {
    const freq = Tone.Frequency(note).toFrequency();
    const dur  = Tone.Time(durStr).toSeconds();
    const atk  = Math.min(0.04, dur*0.15);
    const rel  = Math.min(0.07, dur*0.2);
    this._osc.frequency.setValueAtTime(freq, time);
    this._applyVowel(vowel, time);
    this._env.gain.cancelScheduledValues(time);
    this._env.gain.setValueAtTime(0, time);
    this._env.gain.linearRampToValueAtTime(this._vol, time+atk);
    this._env.gain.setValueAtTime(this._vol*0.82, time+dur-rel);
    this._env.gain.linearRampToValueAtTime(0, time+dur);
  }
  dispose() {
    try { this._osc.stop(); this._osc.disconnect(); } catch(e){}
    try { this._lfo.stop(); this._lfo.disconnect(); } catch(e){}
    try { this._env.disconnect(); } catch(e){}
  }
}

/* ══════════════════════════════════════════
   ヘルパー: イベント時刻を barOffset 小節分ずらす
   ══════════════════════════════════════════ */
const shift = (evs, bars) => evs.map(ev => {
  const [b, bt=0, s=0] = ev.time.split(':').map(Number);
  return { ...ev, time:`${b+bars}:${bt}:${s}` };
});

/* ══════════════════════════════════════════
   コード・ベース・サブ（16小節分をまとめて生成）
   ══════════════════════════════════════════ */
// [bar, bassRoot, bassFifth, padNotes]
const ROOT_MAP = [
  // Verse 1  D-A-Bm-G
  [0,'D2','A2',['D3','F#3','A3','D4']],
  [1,'A1','E2',['A2','E3','A3','C#4']],
  [2,'B1','F#2',['B2','D3','F#3','B3']],
  [3,'G1','D2',['G2','B2','D3','G3']],
  // Verse 2  D-A-Bm-G
  [4,'D2','A2',['D3','F#3','A3','D4']],
  [5,'A1','E2',['A2','E3','A3','C#4']],
  [6,'B1','F#2',['B2','D3','F#3','B3']],
  [7,'G1','D2',['G2','B2','D3','G3']],
  // Pre-Chorus  G-A-G-A
  [8,'G1','D2',['G2','B2','D3','G3']],
  [9,'A1','E2',['A2','C#3','E3','A3']],
  [10,'G1','D2',['G2','B2','D3','G3']],
  [11,'A1','E2',['A2','C#3','E3','A3']],
  // Chorus  Bm-G-D-A
  [12,'B1','F#2',['B2','D3','F#3','B3']],
  [13,'G1','D2',['G2','B2','D3','G3']],
  [14,'D2','A2',['D3','F#3','A3','D4']],
  [15,'A1','E2',['A2','E3','A3','C#4']],
];

const CHORDS = ROOT_MAP.map(([bar,,,notes])=>({time:`${bar}:0:0`,notes}));

const BASS = ROOT_MAP.flatMap(([bar,root,fifth])=>[
  {time:`${bar}:0:0`,note:root,dur:'8n'},
  {time:`${bar}:0:2`,note:root,dur:'16n'},
  {time:`${bar}:1:0`,note:fifth,dur:'8n'},
  {time:`${bar}:2:0`,note:root,dur:'8n'},
  {time:`${bar}:2:2`,note:root,dur:'16n'},
  {time:`${bar}:3:0`,note:fifth,dur:'8n'},
]);

const SUB = ROOT_MAP.map(([bar,root])=>({time:`${bar}:0:0`,note:root,dur:'1m'}));

/* ══════════════════════════════════════════
   メロディ（FMリード）
   ══════════════════════════════════════════ */
const MELODY_A = [
  {time:'0:0:0',note:'D4',dur:'16n'},{time:'0:0:1',note:'F#4',dur:'16n'},
  {time:'0:0:2',note:'A4',dur:'16n'},{time:'0:0:3',note:'D5',dur:'8n'},
  {time:'0:1:1',note:'C#5',dur:'16n'},{time:'0:1:2',note:'B4',dur:'16n'},
  {time:'0:1:3',note:'A4',dur:'16n'},{time:'0:2:0',note:'F#4',dur:'8n'},
  {time:'0:2:2',note:'G4',dur:'8n'},{time:'0:3:0',note:'A4',dur:'4n'},
  {time:'1:0:0',note:'E5',dur:'8n'},{time:'1:0:2',note:'D5',dur:'16n'},
  {time:'1:0:3',note:'C#5',dur:'16n'},{time:'1:1:0',note:'A4',dur:'8n'},
  {time:'1:1:2',note:'B4',dur:'16n'},{time:'1:1:3',note:'C#5',dur:'16n'},
  {time:'1:2:0',note:'E5',dur:'8n'},{time:'1:2:2',note:'D5',dur:'8n'},
  {time:'1:3:0',note:'C#5',dur:'4n'},
  {time:'2:0:0',note:'B4',dur:'8n'},{time:'2:0:2',note:'D5',dur:'16n'},

  {time:'2:1:2',note:'E5',dur:'16n'},{time:'2:1:3',note:'D5',dur:'16n'},

  {time:'2:2:2',note:'A4',dur:'16n'},{time:'2:2:3',note:'G#4',dur:'16n'},
  {time:'2:3:0',note:'A4',dur:'4n'},
  {time:'3:0:0',note:'B4',dur:'8n'},{time:'3:0:2',note:'D5',dur:'8n'},
  {time:'3:1:0',note:'G5',dur:'8n'},{time:'3:1:2',note:'F#5',dur:'16n'},
  {time:'3:1:3',note:'E5',dur:'16n'},{time:'3:2:0',note:'D5',dur:'16n'},
  {time:'3:2:1',note:'C#5',dur:'16n'},{time:'3:2:2',note:'B4',dur:'16n'},
  {time:'3:2:3',note:'A4',dur:'16n'},{time:'3:3:0',note:'D5',dur:'4n'},
];

// Pre-chorus: G-A-G-A、上昇してクライマックスへ
const MELODY_B = [
  {time:'8:0:0',note:'G4',dur:'8n'},{time:'8:0:2',note:'A4',dur:'8n'},
  {time:'8:1:0',note:'B4',dur:'4n'},{time:'8:2:0',note:'D5',dur:'8n'},
  {time:'8:2:2',note:'C#5',dur:'8n'},{time:'8:3:0',note:'D5',dur:'4n'},
  {time:'9:0:0',note:'E5',dur:'4n'},{time:'9:1:0',note:'D5',dur:'8n'},
  {time:'9:1:2',note:'C#5',dur:'8n'},{time:'9:2:0',note:'B4',dur:'8n'},
  {time:'9:2:2',note:'C#5',dur:'8n'},{time:'9:3:0',note:'E5',dur:'4n'},
  {time:'10:0:0',note:'D5',dur:'8n'},{time:'10:0:2',note:'E5',dur:'8n'},
  {time:'10:1:0',note:'F#5',dur:'4n'},{time:'10:2:0',note:'E5',dur:'8n'},
  {time:'10:2:2',note:'D5',dur:'8n'},{time:'10:3:0',note:'G5',dur:'4n'},
  {time:'11:0:0',note:'F#5',dur:'8n'},{time:'11:0:2',note:'E5',dur:'8n'},
  {time:'11:1:0',note:'D5',dur:'4n'},{time:'11:2:0',note:'C#5',dur:'8n'},
  {time:'11:2:2',note:'B4',dur:'8n'},{time:'11:3:0',note:'A4',dur:'8n'},
  {time:'11:3:2',note:'E5',dur:'8n'},

// Chorus: Bm-G-D-A、感情的なクライマックス
const MELODY_C = [
  {time:'12:0:0',note:'B4',dur:'8n'},{time:'12:0:2',note:'D5',dur:'16n'},
  {time:'12:0:3',note:'E5',dur:'16n'},{time:'12:1:0',note:'F#5',dur:'4n'},
  {time:'12:2:0',note:'E5',dur:'8n'},{time:'12:2:2',note:'D5',dur:'8n'},
  {time:'12:3:0',note:'C#5',dur:'4n'},
  {time:'13:0:0',note:'B4',dur:'8n'},{time:'13:0:2',note:'D5',dur:'8n'},
  {time:'13:1:0',note:'E5',dur:'4n'},{time:'13:2:0',note:'D5',dur:'8n'},
  {time:'13:2:2',note:'B4',dur:'8n'},{time:'13:3:0',note:'G5',dur:'4n'},
  {time:'14:0:0',note:'F#5',dur:'4n'},{time:'14:1:0',note:'E5',dur:'8n'},
  {time:'14:1:2',note:'D5',dur:'8n'},{time:'14:2:0',note:'C#5',dur:'8n'},
  {time:'14:2:2',note:'D5',dur:'16n'},{time:'14:2:3',note:'E5',dur:'16n'},
  {time:'14:3:0',note:'F#5',dur:'4n'},
  {time:'15:0:0',note:'E5',dur:'4n'},{time:'15:1:0',note:'D5',dur:'8n'},
  {time:'15:1:2',note:'C#5',dur:'8n'},{time:'15:2:0',note:'A4',dur:'4n'},
  {time:'15:3:0',note:'D5',dur:'4n'},
];

const MELODY = [...MELODY_A, ...shift(MELODY_A,4), ...MELODY_B, ...MELODY_C];

/* ══════════════════════════════════════════
   ストリングス
   ══════════════════════════════════════════ */
const STRINGS_A = [
  {time:'0:0:0',notes:['D4','F#4'],dur:'2n'},{time:'0:2:0',notes:['A4','D5'],dur:'2n'},
  {time:'1:0:0',notes:['E4','A4'],dur:'2n'},{time:'1:2:0',notes:['C#5','E5'],dur:'2n'},
  {time:'2:0:0',notes:['B4','D5'],dur:'4n'},{time:'2:1:0',notes:['F#5','A5'],dur:'4n'},
  {time:'2:2:0',notes:['E5','G#5'],dur:'4n'},{time:'2:3:0',notes:['D5','F#5'],dur:'4n'},
  {time:'3:0:0',notes:['G4','B4'],dur:'4n'},{time:'3:1:0',notes:['G5','B5'],dur:'4n'},
  {time:'3:2:0',notes:['F#5','A5'],dur:'4n'},{time:'3:3:0',notes:['D5','G5'],dur:'4n'},
];
const STRINGS_B = [
  {time:'8:0:0',notes:['G4','B4'],dur:'2n'},{time:'8:2:0',notes:['D5','G5'],dur:'2n'},
  {time:'9:0:0',notes:['A4','C#5'],dur:'2n'},{time:'9:2:0',notes:['E5','A5'],dur:'2n'},
  {time:'10:0:0',notes:['G4','B4'],dur:'4n'},{time:'10:1:0',notes:['B4','D5'],dur:'4n'},
  {time:'10:2:0',notes:['D5','G5'],dur:'4n'},{time:'10:3:0',notes:['G5','B5'],dur:'4n'},
  {time:'11:0:0',notes:['F#5','A5'],dur:'4n'},{time:'11:1:0',notes:['E5','G#5'],dur:'4n'},
  {time:'11:2:0',notes:['D5','F#5'],dur:'4n'},{time:'11:3:0',notes:['C#5','E5'],dur:'4n'},
];
const STRINGS_C = [
  {time:'12:0:0',notes:['B4','D5','F#5'],dur:'4n'},{time:'12:1:0',notes:['D5','F#5','A5'],dur:'4n'},
  {time:'12:2:0',notes:['C#5','E5','A5'],dur:'4n'},{time:'12:3:0',notes:['B4','D5','F#5'],dur:'4n'},
  {time:'13:0:0',notes:['G4','B4','D5'],dur:'4n'},{time:'13:1:0',notes:['B4','D5','G5'],dur:'4n'},
  {time:'13:2:0',notes:['D5','G5','B5'],dur:'4n'},{time:'13:3:0',notes:['G5','B5'],dur:'4n'},
  {time:'14:0:0',notes:['F#5','A5'],dur:'4n'},{time:'14:1:0',notes:['E5','A5'],dur:'4n'},
  {time:'14:2:0',notes:['D5','F#5','A5'],dur:'4n'},{time:'14:3:0',notes:['E5','G#5','B5'],dur:'4n'},
  {time:'15:0:0',notes:['E5','A5'],dur:'4n'},{time:'15:1:0',notes:['D5','F#5','A5'],dur:'4n'},

const STRINGS = [...STRINGS_A, ...shift(STRINGS_A,4), ...STRINGS_B, ...STRINGS_C];

/* ══════════════════════════════════════════
   ボカロ（歌詞 + 母音付き）
   ══════════════════════════════════════════ */
// Verse 1: 春の風が吹いている / 夢の中で君に会いたい
const VOCAL_A = [
  {time:'0:0:0',note:'D4',dur:'8n',vowel:'ア'},
  {time:'0:0:2',note:'F#4',dur:'8n',vowel:'オ'},
  {time:'0:1:0',note:'A4',dur:'4n',vowel:'ア'},
  {time:'0:1:3',note:'A4',dur:'16n',vowel:'ア'},
  {time:'0:2:2',note:'F#4',dur:'8n',vowel:'ウ'},
  {time:'0:3:0',note:'G4',dur:'8n',vowel:'イ'},

/* ══════════════════════════════════════════
   セクション情報
   ══════════════════════════════════════════ */
const SECTIONS = [
  {bar:0, label:'Verse 1',    chords:['D','A','Bm','G']},
  {bar:4, label:'Verse 2',    chords:['D','A','Bm','G']},
  {bar:8, label:'Pre-Chorus', chords:['G','A','G','A']},
  {bar:12,label:'Chorus',     chords:['Bm','G','D','A']},
];

function updateChordDisplay(bar) {
  const sec = [...SECTIONS].reverse().find(s => s.bar <= bar) ?? SECTIONS[0];
  const pos = bar - sec.bar;
  document.getElementById('section-label').textContent = sec.label;
  document.querySelectorAll('.cp').forEach((p,i) => {
    p.textContent = sec.chords[i] ?? '';
    p.classList.toggle('active', i === pos);
  });
}

/* ══════════════════════════════════════════
   オーディオグラフ（async — Reverb IR 生成を await）
   ══════════════════════════════════════════ */
const LOOP_END = '16m';
const TRACKS   = ['vocal','lead','strings','bass','sub','drum'];
const muteState = Object.fromEntries(TRACKS.map(t=>[t,false]));
const flashLvl  = Object.fromEntries(TRACKS.map(t=>[t,0]));

let synths={}, parts=[], fftAna=null, playing=false, rafId;
let lyricTimes=[], loopSec=0;

async function buildAudio() {
  const actx = Tone.getContext().rawContext;
  const comp  = new Tone.Compressor({threshold:-18,ratio:4,attack:0.003,release:0.1});
  const limit = new Tone.Limiter(-1);
  comp.chain(limit, Tone.getDestination());
  fftAna = new Tone.Analyser('fft', 32);
  limit.connect(fftAna);

  const [room, hall, sht] = await Promise.all([
    new Tone.Reverb({decay:1.8, wet:0.22}).generate(),
    new Tone.Reverb({decay:3.5, wet:0.30}).generate(),
    new Tone.Reverb({decay:0.5, wet:0.18}).generate(),
  ]);
  room.connect(comp); hall.connect(comp); sht.connect(comp);

  // ボカロ — vocalGain.input は生の GainNode
  const vGain = new Tone.Gain(0.9).connect(room);
  synths.vocal = new FormantSynth(actx, vGain.input);

  // FMリード
  const ldDly = new Tone.FeedbackDelay({delayTime:'8n',feedback:0.26,wet:0.22}).connect(room);
  synths.lead = new Tone.FMSynth({
    harmonicity:3.5, modulationIndex:14,
    oscillator:{type:'sine'},
    envelope:{attack:0.01,decay:0.08,sustain:0.6,release:0.35},
    modulation:{type:'square'},
    modulationEnvelope:{attack:0.01,decay:0.18,sustain:0.25,release:0.1},
    volume:-5,
  }).connect(ldDly);

  // ストリングス
  const vibrato = new Tone.Vibrato({frequency:5.2,depth:0.06,wet:0.8}).connect(hall);
  const chorus  = new Tone.Chorus({frequency:3,delayTime:3.5,depth:0.4,wet:0.5}).start().connect(vibrato);
  synths.strings = new Tone.PolySynth(Tone.AMSynth, {
    harmonicity:1.5, oscillator:{type:'sawtooth'},
    envelope:{attack:0.25,decay:0.1,sustain:0.75,release:1.8},
    modulation:{type:'sine'},
    modulationEnvelope:{attack:0.4,decay:0,sustain:1,release:0.5},
    volume:-10,
  }).connect(chorus);

  // パッド
  synths.pad = new Tone.PolySynth(Tone.Synth, {
    oscillator:{type:'sine'},
    envelope:{attack:0.2,decay:0.3,sustain:0.5,release:1.5},
    volume:-14,
  }).connect(hall);

  // ベース
  synths.bass = new Tone.MonoSynth({
    oscillator:{type:'sawtooth'},
    filter:{frequency:400,type:'lowpass',rolloff:-24},
    filterEnvelope:{attack:0.01,decay:0.1,sustain:0.4,release:0.2,baseFrequency:200,octaves:2.5},
    envelope:{attack:0.01,decay:0.12,sustain:0.55,release:0.25},
    volume:-5,
  }).connect(comp);

  // サブ
  synths.sub = new Tone.Synth({
    oscillator:{type:'sine'},
    envelope:{attack:0.06,decay:0.3,sustain:0.7,release:0.6},
    volume:-7,
  }).connect(comp);

  // ドラム
  const kComp = new Tone.Compressor({threshold:-12,ratio:6}).connect(comp);
  synths.kick  = new Tone.MembraneSynth({pitchDecay:0.06,octaves:7,envelope:{attack:0.001,decay:0.36,sustain:0,release:0.12},volume:1}).connect(kComp);
  synths.snare = new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:0.001,decay:0.14,sustain:0,release:0.06},volume:-6}).connect(sht);
  synths.hat   = new Tone.MetalSynth({frequency:400,harmonicity:5.1,modulationIndex:32,resonance:4200,octaves:1.5,envelope:{attack:0.001,decay:0.04,release:0.01},volume:-16}).connect(comp);
  synths.ohat  = new Tone.MetalSynth({frequency:400,harmonicity:5.1,modulationIndex:32,resonance:4200,octaves:1.5,envelope:{attack:0.001,decay:0.22,release:0.06},volume:-18}).connect(sht);
}

function disposeSynths() {
  if (synths.vocal) { synths.vocal.dispose(); }
  Object.entries(synths).forEach(([k,s]) => { if(k==='vocal')return; try{s.dispose?.();}catch(e){} });
  synths = {};
  parts.forEach(p=>{ try{p.dispose?.();}catch(e){} }); parts=[];
  if(fftAna){try{fftAna.dispose();}catch(e){} fftAna=null;}
}

/* ══════════════════════════════════════════
   パート
   ══════════════════════════════════════════ */
function makePart(events, fn) {
  const p = new Tone.Part(fn, events);
  p.loop=true; p.loopEnd=LOOP_END; p.start(0); parts.push(p);
}

function buildParts() {
  makePart(VOCAL, (time,ev) => {
    if(muteState.vocal) return;
    synths.vocal.triggerAttackRelease(ev.note,ev.dur,time,ev.vowel);
    Tone.getDraw().schedule(()=>{flashLvl.vocal=1;},time);
  });
  makePart(MELODY,(time,ev)=>{
    if(muteState.lead) return;
    synths.lead.triggerAttackRelease(ev.note,ev.dur,time);
    Tone.getDraw().schedule(()=>{flashLvl.lead=1;},time);
  });
  makePart(STRINGS,(time,ev)=>{
    if(muteState.strings) return;
    synths.strings.triggerAttackRelease(ev.notes,ev.dur,time);
    Tone.getDraw().schedule(()=>{flashLvl.strings=0.9;},time);
  });
  makePart(CHORDS,(time,ev)=>{
    synths.pad.triggerAttackRelease(ev.notes,'2n.',time);
  });
  makePart(BASS,(time,ev)=>{
    if(muteState.bass) return;
    synths.bass.triggerAttackRelease(ev.note,ev.dur,time);
    Tone.getDraw().schedule(()=>{flashLvl.bass=0.85;},time);
  });
  makePart(SUB,(time,ev)=>{
    if(muteState.sub) return;
    synths.sub.triggerAttackRelease(ev.note,ev.dur,time);
    Tone.getDraw().schedule(()=>{flashLvl.sub=0.7;},time);
  });

  const drumSeq = new Tone.Sequence((time,step)=>{
    if(muteState.drum) return;
    if([0,8].includes(step))  synths.kick.triggerAttackRelease('C1','8n',time);
    if([4,12].includes(step)) synths.snare.triggerAttackRelease('8n',time);
    if([6,14].includes(step)) synths.ohat.triggerAttackRelease('16n',time);
    else if(step%2===0)       synths.hat.triggerAttackRelease('32n',time);
    if(step===9)              synths.snare.triggerAttackRelease('32n',time);
    if([0,4,8,12].includes(step)) Tone.getDraw().schedule(()=>{flashLvl.drum=1;},time);
  },[...Array(16).keys()],'16n');
  drumSeq.start(0); parts.push(drumSeq);

  // 小節ごとのコード/セクション表示
  const barEvents = ROOT_MAP.map(([bar])=>({time:`${bar}:0:0`,bar}));
  const cpPart = new Tone.Part((time,ev)=>{
    Tone.getDraw().schedule(()=>updateChordDisplay(ev.bar), time);
  }, barEvents);
  cpPart.loop=true; cpPart.loopEnd=LOOP_END; cpPart.start(0); parts.push(cpPart);
}

/* ══════════════════════════════════════════
   再生 / 停止
   ══════════════════════════════════════════ */
async function startPlayback() {
  if(playing) return;
  await Tone.start();
  const btn = document.getElementById('btn-play');
  btn.textContent='生成中...'; btn.style.opacity='0.5';
  document.getElementById('status').textContent='リバーブ生成中...';

  Tone.Transport.bpm.value = parseInt(document.getElementById('sl-bpm').value);
  Tone.Transport.loop=true; Tone.Transport.loopStart=0; Tone.Transport.loopEnd=LOOP_END;

  await buildAudio();

  // BPM確定後に歌詞タイムをキャッシュ
  loopSec = Tone.Time(LOOP_END).toSeconds();
  lyricTimes = LYRICS.map(l=>Tone.Time(l.time).toSeconds());

  buildParts();
  Tone.Transport.start();
  playing=true;
  btn.textContent='▶ 再生'; btn.style.opacity='0.45';
  document.getElementById('status').textContent='再生中 ▶';
  tick();
}

function stopPlayback() {
  if(!playing) return;
  playing=false;
  cancelAnimationFrame(rafId);
  Tone.Transport.stop(); Tone.Transport.cancel();
  disposeSynths();
  document.getElementById('section-label').textContent='—';
  document.querySelectorAll('.cp').forEach(p=>{p.classList.remove('active');});
  document.getElementById('prog').style.width='0%';
  document.getElementById('btn-play').style.opacity='1';
  document.getElementById('btn-play').textContent='▶ 再生';
  document.getElementById('status').textContent='停止中';
  document.getElementById('ly-curr').textContent='♪';
  document.getElementById('ly-prev').textContent='';
  document.getElementById('ly-next').textContent='';
  vizBars.forEach(b=>b.style.height='2px');
  TRACKS.forEach(t=>{flashLvl[t]=0;});
  updateChordDisplay(0);
}

/* ══════════════════════════════════════════
   アニメーションループ
   ══════════════════════════════════════════ */
function tick() {
  if(!playing) return;
  rafId = requestAnimationFrame(tick);

  const pos = Tone.Transport.seconds % loopSec;
  document.getElementById('prog').style.width = (pos/loopSec*100)+'%';

  // 歌詞スライドウィンドウ (前 | 現在 | 次)
  let cur = -1;
  for(let i=0;i<lyricTimes.length;i++){
    const end = lyricTimes[i+1]??loopSec;
    if(pos>=lyricTimes[i]&&pos<end){cur=i;break;}
  }
  document.getElementById('ly-prev').textContent = cur>0 ? LYRICS[cur-1].w : '';
  document.getElementById('ly-curr').textContent = cur>=0 ? LYRICS[cur].w : '♪';
  document.getElementById('ly-next').textContent = cur>=0&&cur<LYRICS.length-1 ? LYRICS[cur+1].w : '';

  // FFT
  if(fftAna){
    const vals=fftAna.getValue();
    vizBars.forEach((b,i)=>{
      if(i>=vals.length)return;
      const db=vals[i];
      const n=isFinite(db)?Math.max(0,Math.min(1,(db+80)/80)):0;
      b.style.height=(2+n*70)+'px';
      b.style.background=`rgb(${Math.round(18+n*237)},${Math.round(18+n*92)},${Math.round(42+n*138)})`;
    });
  }

  // メーター
  const mids={vocal:'mv-vocal',lead:'mv-lead',strings:'mv-str',bass:'mv-bass',sub:'mv-sub',drum:'mv-drum'};
  TRACKS.forEach(t=>{
    flashLvl[t]=Math.max(0,flashLvl[t]-0.04);
    const el=document.getElementById(mids[t]);
    if(el) el.style.height=(flashLvl[t]*100)+'%';
  });
}

/* ══════════════════════════════════════════
   UI
   ══════════════════════════════════════════ */
const vizEl=document.getElementById('viz'), vizBars=[];
for(let i=0;i<32;i++){
  const b=document.createElement('div'); b.className='vbar'; b.style.height='2px';
  vizEl.appendChild(b); vizBars.push(b);
}

(function(){
  const wrap=document.getElementById('mutes');
  const lbls={vocal:'Vocal',lead:'Lead',strings:'Strings',bass:'Bass',sub:'Sub',drum:'Drum'};
  TRACKS.forEach(t=>{
    const btn=document.createElement('button'); btn.className='mb on'; btn.textContent=lbls[t];
    btn.addEventListener('click',()=>{ muteState[t]=!muteState[t]; btn.classList.toggle('on',!muteState[t]); });
    wrap.appendChild(btn);
  });
})();

document.getElementById('btn-play').addEventListener('click', startPlayback);
document.getElementById('btn-stop').addEventListener('click', stopPlayback);
document.getElementById('sl-bpm').addEventListener('input', function(){
  document.getElementById('bpm-val').textContent=this.value;
  if(playing) Tone.Transport.bpm.value=parseInt(this.value);
});

// 初期コード表示
updateChordDisplay(0);
</script>
