<script>
/* ════════════════════════════════════════════
   フォルマント合成 — ボカロ声近似
   サウ鋸波 → F1/F2/F3 バンドパスフィルタ群 → ゲインエンベロープ
   ════════════════════════════════════════════ */
class FormantSynth {
  // 日本語母音の代表フォルマント周波数 [F1, F2, F3] (Hz)
  static VOWELS = {
    'ア': [800, 1200, 2500],
    'イ': [280, 2700, 3100],
    'ウ': [300,  900, 2200],
    'エ': [530, 1840, 2500],
    'オ': [500,  800, 2500],
  };

  constructor(actx, destination, volume = 0.22) {
    this._actx = actx;
    this._vol = volume;

    // 出力ゲイン（エンベロープ用）
    this._env = actx.createGain();
    this._env.gain.value = 0;
    this._env.connect(destination);

    // 声帯源：鋸波 = 豊かな倍音 → フォルマントフィルタで母音着色
    this._osc = actx.createOscillator();
    this._osc.type = 'sawtooth';

    // ジッター：自然な揺らぎ（LFO的）
    this._jitter = actx.createOscillator();
    this._jitter.type = 'sine';
    this._jitter.frequency.value = 5.5;
    const jGain = actx.createGain();
    jGain.gain.value = 3; // ±3 Hz のビブラート
    this._jitter.connect(jGain);
    jGain.connect(this._osc.frequency);
    this._jitter.start();

    // 3本のバンドパスフィルタ（F1/F2/F3）
    this._filters = [0, 1, 2].map(() => {
      const f = actx.createBiquadFilter();
      f.type = 'bandpass';
      f.Q.value = 14;
      return f;
    });

    // 高域ロールオフ（きつすぎる倍音を落とす）
    this._lp = actx.createBiquadFilter();
    this._lp.type = 'lowpass';
    this._lp.frequency.value = 4200;

    // ミックス
    const mix = actx.createGain();
    mix.gain.value = 0.9;

    this._filters.forEach(f => {
      this._osc.connect(f);
      f.connect(mix);
    });
    mix.connect(this._lp);
    this._lp.connect(this._env);

    this._osc.start();
    this._setVowel('ア');
  }

  _setVowel(v, time) {
    const [f1, f2, f3] = FormantSynth.VOWELS[v] || FormantSynth.VOWELS['ア'];
    const t = time ?? this._actx.currentTime;
    this._filters[0].frequency.setValueAtTime(f1, t);
    this._filters[1].frequency.setValueAtTime(f2, t);
    this._filters[2].frequency.setValueAtTime(f3, t);
  }

  triggerAttackRelease(noteStr, durStr, time, vowel = 'ア') {
    const freq = Tone.Frequency(noteStr).toFrequency();
    const dur  = Tone.Time(durStr).toSeconds();
    const t    = time;
    const atk  = Math.min(0.04, dur * 0.15);
    const rel  = Math.min(0.06, dur * 0.2);

    this._osc.frequency.cancelScheduledValues(t);
    this._osc.frequency.setValueAtTime(freq, t);
    this._setVowel(vowel, t);

    // 子音っぽいクリック感: 先頭瞬間だけ少し高い
    this._env.gain.cancelScheduledValues(t);
    this._env.gain.setValueAtTime(0, t);
    this._env.gain.linearRampToValueAtTime(this._vol, t + atk);
    this._env.gain.setValueAtTime(this._vol * 0.85, t + dur - rel);
    this._env.gain.linearRampToValueAtTime(0, t + dur);
  }

  dispose() {
    try { this._osc.stop();     this._osc.disconnect();    } catch(e){}
    try { this._jitter.stop();  this._jitter.disconnect(); } catch(e){}
    try { this._env.disconnect();                          } catch(e){}
  }
}

/* ════════════════════════════════════════════

  {time:"0:3:2", note:"A4",  dur:"8n",  vowel:"エ"},  // て
  {time:"1:0:0", note:"E5",  dur:"8n",  vowel:"イ"},  // い
  {time:"1:0:2", note:"D5",  dur:"4n",  vowel:"ウ"},  // る
  {time:"1:2:0", note:"E5",  dur:"4n",  vowel:"ウ"},  // 夢
  {time:"1:3:0", note:"C#5", dur:"4n",  vowel:"オ"},  // の
  {time:"2:0:0", note:"B4",  dur:"8n",  vowel:"ア"},  // 中
  {time:"2:0:2", note:"D5",  dur:"4n",  vowel:"エ"},  // で
  {time:"2:1:2", note:"F#5", dur:"8n",  vowel:"イ"},  // 君
  {time:"2:2:0", note:"E5",  dur:"8n",  vowel:"イ"},  // に
  {time:"2:2:2", note:"D5",  dur:"8n",  vowel:"ア"},  // 会
  {time:"2:3:0", note:"C#5", dur:"8n",  vowel:"イ"},  // い
  {time:"2:3:2", note:"A4",  dur:"8n",  vowel:"ア"},  // た
  {time:"3:0:0", note:"B4",  dur:"4n",  vowel:"イ"},  // い
  {time:"3:2:0", note:"G5",  dur:"4n",  vowel:"ア"},  // 〜
  {time:"3:3:0", note:"D5",  dur:"4n",  vowel:"ア"},

// ── ストリングスカウンターメロディ（バー2-3で対位旋律）──
const STRINGS = [
  // Bar 0: コード和音を分散
  {time:"0:0:0", notes:["D4","F#4"], dur:"2n"},
  {time:"0:2:0", notes:["A4","D5"],  dur:"2n"},
  // Bar 1
  {time:"1:0:0", notes:["E4","A4"],  dur:"2n"},

  // Bar 2: Bm — 対位旋律

  {time:"2:1:0", notes:["F#5","A5"], dur:"4n"},

  {time:"3:0:0", notes:["G4","B4"],  dur:"4n"},

// ── コードパッド ──
const CHORDS = [
  {time:"0:0:0", notes:["D3","F#3","A3","D4"]},

// ── ミッドベース ──
const BASS = [
  {time:"0:0:0",note:"D2",dur:"8n"},{time:"0:0:2",note:"D2",dur:"16n"},
  {time:"0:1:0",note:"A2",dur:"8n"},{time:"0:2:0",note:"D2",dur:"8n"},
  {time:"0:2:2",note:"D2",dur:"16n"},{time:"0:3:0",note:"A2",dur:"8n"},

// ── サブベース（小節単位、重低音）──
const SUB = [
  {time:"0:0:0",note:"D2",dur:"1m"},
  {time:"1:0:0",note:"A2",dur:"1m"},
  {time:"2:0:0",note:"B2",dur:"1m"},

// ── 歌詞 ──
const LYRICS = [
  {time:"0:0:0",w:"春"},{time:"0:0:2",w:"の"},{time:"0:1:0",w:"風"},
  {time:"0:1:3",w:"が"},{time:"0:2:2",w:"吹"},{time:"0:3:0",w:"い"},

/* ════════════════════════════════════════════
   オーディオグラフ
   ════════════════════════════════════════════ */
const LOOP_END = "4m";
let synths = {};
let parts  = [];
let fftAnalyser, meterNodes = {};
let playing = false;
let rafId;

// ミュート状態
const TRACKS = ['vocal','lead','strings','pad','bass','sub','drum'];
const muteState = Object.fromEntries(TRACKS.map(t => [t, false]));

function buildAudio() {
  const actx = Tone.getContext().rawContext;

  // ── マスターバス ──
  const masterComp  = new Tone.Compressor({ threshold: -18, ratio: 4, attack: 0.003, release: 0.1 });
  const masterLimit = new Tone.Limiter(-1);
  masterComp.chain(masterLimit, Tone.getDestination());

  // FFTアナライザ（ビジュアライザ用）
  fftAnalyser = new Tone.Analyser('fft', 32);
  masterLimit.connect(fftAnalyser);

  // ── センドバス ──
  const roomRev  = new Tone.Reverb({ decay: 2.0, wet: 0.25 }).connect(masterComp);
  const hallRev  = new Tone.Reverb({ decay: 4.0, wet: 0.35 }).connect(masterComp);
  const shortRev = new Tone.Reverb({ decay: 0.6, wet: 0.20 }).connect(masterComp);

  // ── ボカロ（フォルマント合成）──
  const vocalRev = new Tone.Reverb({ decay: 1.2, wet: 0.28 }).connect(masterComp);
  const vocalSynth = new FormantSynth(actx, vocalRev._gainNode ?? vocalRev.input ?? Tone.getContext().rawContext.destination);

  // FormantSynth は rawContext で作るため Tone の chain の外。
  // Tone.Reverb の入力 AudioNode を取得してそこに接続する。
  // → ここでは Tone.Gain ラッパーを使って橋渡しする。
  const vGain = new Tone.Gain(1).connect(roomRev);
  // FormantSynth の出力を Tone.Gain の入力に接続
  vocalSynth._env.disconnect();
  vocalSynth._env.connect(vGain.input);

  // レベルメーター用ゲイン
  meterNodes.vocal = new Tone.Meter({ normalRange: true });
  vGain.connect(meterNodes.vocal);

  synths.vocal = vocalSynth;
  synths.vGain = vGain;

  // ── FMリードシンセ ──
  const leadDelay = new Tone.FeedbackDelay({ delayTime: "8n", feedback: 0.28, wet: 0.25 }).connect(roomRev);
  const leadSynth = new Tone.FMSynth({
    harmonicity: 3.5, modulationIndex: 14,
    oscillator: { type: "sine" },
    envelope: { attack: 0.01, decay: 0.08, sustain: 0.6, release: 0.35 },
    modulation: { type: "square" },
    modulationEnvelope: { attack: 0.01, decay: 0.18, sustain: 0.25, release: 0.1 },
    volume: -5,
  }).connect(leadDelay);
  meterNodes.lead = new Tone.Meter({ normalRange: true });
  leadSynth.connect(meterNodes.lead);
  synths.lead = leadSynth;

  // ── ストリングス（AMSynth + Vibrato + Chorus）──
  const strVibrato = new Tone.Vibrato({ frequency: 5.2, depth: 0.06 }).connect(hallRev);
  const strChorus  = new Tone.Chorus({ frequency: 3, delayTime: 3.5, depth: 0.4, wet: 0.5 }).start().connect(strVibrato);
  const strSynth   = new Tone.PolySynth(Tone.AMSynth, {
    harmonicity: 1.5,
    oscillator: { type: "sawtooth" },
    envelope: { attack: 0.25, decay: 0.1, sustain: 0.75, release: 1.8 },
    modulation: { type: "sine" },
    modulationEnvelope: { attack: 0.4, decay: 0, sustain: 1, release: 0.5 },
    volume: -9,
  }).connect(strChorus);
  meterNodes.strings = new Tone.Meter({ normalRange: true });
  strSynth.connect(meterNodes.strings);
  synths.strings = strSynth;

  // ── コードパッド ──
  const padSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "sine" },
    envelope: { attack: 0.2, decay: 0.3, sustain: 0.5, release: 1.5 },
    volume: -13,
  }).connect(hallRev);
  synths.pad = padSynth;

  // ── ミッドベース ──
  const bassSynth = new Tone.MonoSynth({
    oscillator: { type: "sawtooth" },
    filter: { frequency: 380, type: "lowpass", rolloff: -24 },
    filterEnvelope: { attack: 0.01, decay: 0.1, sustain: 0.4, release: 0.2, baseFrequency: 200, octaves: 2.5 },
    envelope: { attack: 0.01, decay: 0.12, sustain: 0.55, release: 0.25 },
    volume: -5,
  }).connect(masterComp);
  meterNodes.bass = new Tone.Meter({ normalRange: true });
  bassSynth.connect(meterNodes.bass);
  synths.bass = bassSynth;

  // ── サブベース（サイン波、超低域）──
  const subSynth = new Tone.Synth({
    oscillator: { type: "sine" },
    envelope: { attack: 0.05, decay: 0.3, sustain: 0.7, release: 0.5 },
    volume: -7,
  }).connect(masterComp);
  meterNodes.sub = new Tone.Meter({ normalRange: true });
  subSynth.connect(meterNodes.sub);
  synths.sub = subSynth;

  // ── ドラムキット ──
  const kickComp = new Tone.Compressor({ threshold: -12, ratio: 6 }).connect(masterComp);
  const kick  = new Tone.MembraneSynth({ pitchDecay: 0.06, octaves: 7,
    envelope: { attack: 0.001, decay: 0.35, sustain: 0, release: 0.1 }, volume: 0,
  }).connect(kickComp);
  const snare = new Tone.NoiseSynth({ noise: { type: "white" },
    envelope: { attack: 0.001, decay: 0.14, sustain: 0, release: 0.06 }, volume: -7,
  }).connect(shortRev);
  const hat   = new Tone.MetalSynth({ frequency: 400, harmonicity: 5.1,
    modulationIndex: 32, resonance: 4200, octaves: 1.5,
    envelope: { attack: 0.001, decay: 0.04, release: 0.01 }, volume: -15,
  }).connect(masterComp);
  const openHat = new Tone.MetalSynth({ frequency: 400, harmonicity: 5.1,
    modulationIndex: 32, resonance: 4200, octaves: 1.5,
    envelope: { attack: 0.001, decay: 0.22, release: 0.06 }, volume: -18,
  }).connect(shortRev);
  meterNodes.drum = new Tone.Meter({ normalRange: true });
  kick.connect(meterNodes.drum);
  synths.kick = kick; synths.snare = snare; synths.hat = hat; synths.openHat = openHat;

  return { masterComp };
}

function disposeSynths() {
  Object.values(synths).forEach(s => { try { s.dispose?.(); } catch(e){} });
  synths = {};
  Object.values(meterNodes).forEach(m => { try { m.dispose?.(); } catch(e){} });
  meterNodes = {};
  parts.forEach(p => { try { p.dispose?.(); } catch(e){} });
  parts = [];
}

/* ════════════════════════════════════════════
   パート構築
   ════════════════════════════════════════════ */
function makePart(events, fn) {
  const p = new Tone.Part(fn, events);
  p.loop    = true;
  p.loopEnd = LOOP_END;
  p.start(0);
  parts.push(p);
  return p;
}

function buildParts() {
  // ボカロ
  makePart(VOCAL, (time, ev) => {
    if (muteState.vocal) return;
    synths.vocal.triggerAttackRelease(ev.note, ev.dur, time, ev.vowel);
  });

  // FMリード
  makePart(MELODY, (time, ev) => {
    if (muteState.lead) return;
    synths.lead.triggerAttackRelease(ev.note, ev.dur, time);
  });

  // ストリングス
  makePart(STRINGS, (time, ev) => {
    if (muteState.strings) return;
    synths.strings.triggerAttackRelease(ev.notes, ev.dur, time);
  });

  // コードパッド
  makePart(CHORDS, (time, ev) => {
    if (muteState.pad) return;
    synths.pad.triggerAttackRelease(ev.notes, "2n.", time);
  });

  // ミッドベース
  makePart(BASS, (time, ev) => {
    if (muteState.bass) return;
    synths.bass.triggerAttackRelease(ev.note, ev.dur, time);
  });

  // サブベース
  makePart(SUB, (time, ev) => {
    if (muteState.sub) return;
    synths.sub.triggerAttackRelease(ev.note, ev.dur, time);
  });

  // ドラム（16ステップ × 1小節ループ）
  // kick: 0,8  snare: 4,12  openhat: 6,14  hat: rest
  const drumSeq = new Tone.Sequence((time, step) => {
    if (muteState.drum) return;
    if ([0, 8].includes(step))      synths.kick.triggerAttackRelease("C1", "8n", time);
    if ([4, 12].includes(step))     synths.snare.triggerAttackRelease("8n", time);
    if ([6, 14].includes(step))     synths.openHat.triggerAttackRelease("16n", time);
    else if ([0,2,4,6,8,10,12,14].includes(step)) synths.hat.triggerAttackRelease("32n", time);
    // ghost snare on 9
    if (step === 9) synths.snare.triggerAttackRelease("32n", time);
  }, [...Array(16).keys()], "16n");
  drumSeq.start(0);
  parts.push(drumSeq);

  // コード表示パート
  const cpPart = new Tone.Part((time, ev) => {
    Tone.getDraw().schedule(() => {
      document.querySelectorAll('.cp').forEach(p => p.classList.remove('active'));
      document.getElementById('cp-' + ev.i)?.classList.add('active');
    }, time);
  }, [{time:"0:0:0",i:0},{time:"1:0:0",i:1},{time:"2:0:0",i:2},{time:"3:0:0",i:3}]);
  cpPart.loop    = true;
  cpPart.loopEnd = LOOP_END;
  cpPart.start(0);
  parts.push(cpPart);
}

/* ════════════════════════════════════════════
   再生 / 停止
   ════════════════════════════════════════════ */
async function startPlayback() {
  await Tone.start();
  Tone.Transport.bpm.value = parseInt(document.getElementById('sl-bpm').value);
  Tone.Transport.loop      = true;
  Tone.Transport.loopStart = 0;
  Tone.Transport.loopEnd   = LOOP_END;

  buildAudio();
  buildParts();

  Tone.Transport.start();
  playing = true;
  document.getElementById('btn-play').style.opacity = '0.45';
  document.getElementById('status').textContent = '再生中 ▶';
  tick();
}

function stopPlayback() {
  playing = false;
  cancelAnimationFrame(rafId);
  Tone.Transport.stop();
  Tone.Transport.cancel();
  disposeSynths();
  document.querySelectorAll('.cp').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.lw').forEach(p => p.classList.remove('lit'));
  document.getElementById('prog').style.width = '0%';
  document.getElementById('btn-play').style.opacity = '1';
  document.getElementById('status').textContent = '停止中';
  vizBars.forEach(b => { b.style.height = '3px'; b.style.background = '#12122a'; });
}

/* ════════════════════════════════════════════
   アニメーションループ
   ════════════════════════════════════════════ */
function tick() {
  if (!playing) return;
  rafId = requestAnimationFrame(tick);

  const loopSec = Tone.Time(LOOP_END).toSeconds();
  const pos     = Tone.Transport.seconds % loopSec;

  // プログレスバー
  document.getElementById('prog').style.width = (pos / loopSec * 100) + '%';

  // 歌詞ハイライト
  const lytimes = LYRICS.map(l => Tone.Time(l.time).toSeconds());
  LYRICS.forEach((l, i) => {
    const s = lytimes[i];
    const e = lytimes[i + 1] ?? loopSec;
    document.getElementById('lw' + i)?.classList.toggle('lit', pos >= s && pos < e);
  });

  // FFTビジュアライザ
  if (fftAnalyser) {
    const vals = fftAnalyser.getValue(); // Float32Array, dB
    vizBars.forEach((b, i) => {
      if (i >= vals.length) return;
      const db   = vals[i];
      const norm = Math.max(0, Math.min(1, (db + 80) / 80));
      b.style.height = (3 + norm * 68) + 'px';
      const r = Math.round(18 + norm * 237);
      const g = Math.round(18 + norm * 92);
      const bl= Math.round(42 + norm * 138);
      b.style.background = `rgb(${r},${g},${bl})`;
    });
  }

  // トラックメーター
  const meterMap = {vocal:'m-vocal', lead:'m-lead', strings:'m-str', bass:'m-bass', sub:'m-sub', drum:'m-drum'};
  Object.entries(meterMap).forEach(([key, id]) => {
    const m = meterNodes[key];
    if (!m) return;
    const v   = m.getValue();
    const pct = Math.min(100, Math.max(0, v * 100));
    const el  = document.getElementById(id);
    if (el) el.style.height = pct + '%';
  });
}

/* ════════════════════════════════════════════
   UI 構築
   ════════════════════════════════════════════ */

// FFTビジュアライザバー
const vizEl  = document.getElementById('viz');
const VIZ_N  = 32;
const vizBars = [];
for (let i = 0; i < VIZ_N; i++) {
  const b = document.createElement('div');
  b.className = 'vbar';
  b.style.height = '3px';
  vizEl.appendChild(b);
  vizBars.push(b);
}

// 歌詞
(function buildLyrics() {
  const el = document.getElementById('lyrics');
  LYRICS.forEach((l, i) => {
    const s = document.createElement('span');
    s.className = 'lw';
    s.id = 'lw' + i;
    s.textContent = l.w;
    el.appendChild(s);
  });
})();

// ミュートボタン
(function buildMutes() {
  const wrap = document.getElementById('mutes');
  const LABELS = {vocal:'Vocal', lead:'Lead', strings:'Strings', pad:'Pad', bass:'Bass', sub:'Sub', drum:'Drum'};
  TRACKS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'mute-btn on';
    btn.textContent = LABELS[t];
    btn.dataset.track = t;
    btn.addEventListener('click', () => {
      muteState[t] = !muteState[t];
      btn.classList.toggle('on', !muteState[t]);
    });
    wrap.appendChild(btn);
  });
})();

// イベントリスナー
document.getElementById('btn-play').addEventListener('click', () => { if (!playing) startPlayback(); });
document.getElementById('btn-stop').addEventListener('click', stopPlayback);
document.getElementById('sl-bpm').addEventListener('input', function() {
  document.getElementById('bpm-val').textContent = this.value;
  Tone.Transport.bpm.value = parseInt(this.value);
});
</script>
