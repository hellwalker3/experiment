<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXP-001: ボカロ曲プレイヤー</title>
  <script src="https://unpkg.com/tone@14/build/Tone.js"></script>
  <style>
    body {
      font-family: monospace;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background: #0d0d0d;
      color: #e0e0e0;
    }
    h1 { color: #7fff7f; }
    a.back { color: #888; text-decoration: none; font-size: 0.85em; }
    a.back:hover { color: #aaa; }

    #controls { margin: 24px 0; display: flex; gap: 12px; }
    button {
      background: #1a1a1a;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 8px 20px;
      cursor: pointer;
      font-family: monospace;
      border-radius: 4px;
    }
    button:hover { background: #2a2a2a; }
    button:disabled { opacity: 0.4; cursor: default; }

    #lyrics {
      line-height: 2.2;
      font-size: 1.2em;
    }
    .lyric-word {
      display: inline-block;
      padding: 2px 4px;
      border-radius: 3px;
      transition: background 0.1s, color 0.1s;
    }
    .lyric-word.active {
      background: #7fff7f;
      color: #0d0d0d;
    }

    #bpm-display { color: #888; font-size: 0.85em; margin-top: 16px; }
    #time-display { color: #555; font-size: 0.8em; margin-top: 8px; }
  </style>
</head>
<body>
  <a class="back" href="../../index.html">← 実験一覧</a>
  <h1>EXP-001: ボカロ曲プレイヤー</h1>
  <p>Tone.js で伴奏を再生しながら歌詞をハイライト。</p>

  <div id="controls">
    <button id="btn-play">▶ 再生</button>
    <button id="btn-stop" disabled>■ 停止</button>
  </div>

  <div id="lyrics"></div>
  <div id="bpm-display">BPM: 120</div>
  <div id="time-display">0.00s</div>

  <script>
    // --- 歌詞データ (秒単位でタイミング指定) ---
    const lyrics = [
      { time: 0.5,  word: "春" },
      { time: 1.0,  word: "の" },
      { time: 1.3,  word: "風" },
      { time: 1.8,  word: "が" },
      { time: 2.3,  word: "吹" },
      { time: 2.6,  word: "い" },
      { time: 2.9,  word: "て" },
      { time: 3.5,  word: "い" },
      { time: 3.8,  word: "る" },
      { time: 4.8,  word: "夢" },
      { time: 5.3,  word: "の" },
      { time: 5.7,  word: "中" },
      { time: 6.2,  word: "で" },
      { time: 6.8,  word: "君" },
      { time: 7.2,  word: "に" },
      { time: 7.6,  word: "会" },
      { time: 8.0,  word: "っ" },
      { time: 8.3,  word: "た" },
    ];

    // --- 伴奏シーケンス ---
    const BPM = 120;
    // コード進行: Am - F - C - G (各2拍)
    const chords = [
      ["A3","C4","E4"],
      ["F3","A3","C4"],
      ["C3","E3","G3"],
      ["G3","B3","D4"],
    ];

    let synth, chordSynth, startTime, rafId;
    let playing = false;

    const lyricsEl = document.getElementById("lyrics");
    const timeEl   = document.getElementById("time-display");
    const btnPlay  = document.getElementById("btn-play");
    const btnStop  = document.getElementById("btn-stop");

    // 歌詞 DOM を構築
    function buildLyrics() {
      lyricsEl.innerHTML = "";
      lyrics.forEach((item, i) => {
        const span = document.createElement("span");
        span.className = "lyric-word";
        span.id = "w" + i;
        span.textContent = item.word;
        lyricsEl.appendChild(span);
      });
    }

    function highlightAt(sec) {
      lyrics.forEach((item, i) => {
        const el = document.getElementById("w" + i);
        if (!el) return;
        const next = lyrics[i + 1];
        const active = sec >= item.time && (!next || sec < next.time);
        el.classList.toggle("active", active);
      });
    }

    function tick() {
      if (!playing) return;
      const elapsed = Tone.now() - startTime;
      timeEl.textContent = elapsed.toFixed(2) + "s";
      highlightAt(elapsed);
      rafId = requestAnimationFrame(tick);
    }

    async function startPlayback() {
      await Tone.start();
      Tone.Transport.bpm.value = BPM;

      // メロディ風シンセ
      synth = new Tone.Synth({
        oscillator: { type: "triangle" },
        envelope: { attack: 0.05, decay: 0.1, sustain: 0.6, release: 0.4 },
      }).toDestination();

      // コードシンセ
      chordSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 0.8 },
        volume: -8,
      }).toDestination();

      // 1拍 = 60/BPM 秒
      const beat = 60 / BPM;

      // コード進行をループ (各コード2拍)
      const part = new Tone.Sequence(
        (time, chord) => {
          chordSynth.triggerAttackRelease(chord, beat * 1.8, time);
        },
        chords,
        beat * 2
      );

      // 簡単なメロディライン
      const melody = [
        { note: "E4", dur: "8n" }, { note: "D4", dur: "8n" },
        { note: "C4", dur: "4n" }, { note: "E4", dur: "8n" },
        { note: "F4", dur: "8n" }, { note: "E4", dur: "4n" },
        { note: "D4", dur: "8n" }, { note: "E4", dur: "8n" },
        { note: "G4", dur: "2n" },
      ];
      let offset = 0;
      melody.forEach(({ note, dur }) => {
        synth.triggerAttackRelease(note, dur, "+" + (offset * beat));
        const beats = { "8n": 0.5, "4n": 1, "2n": 2 };
        offset += beats[dur] || 1;
      });

      part.start(0);
      Tone.Transport.start();
      startTime = Tone.now();
      playing = true;

      btnPlay.disabled = true;
      btnStop.disabled = false;

      tick();
    }

    function stopPlayback() {
      playing = false;
      cancelAnimationFrame(rafId);
      Tone.Transport.stop();
      Tone.Transport.cancel();
      if (synth) synth.dispose();
      if (chordSynth) chordSynth.dispose();
      synth = null;
      chordSynth = null;

      document.querySelectorAll(".lyric-word").forEach(el => el.classList.remove("active"));
      timeEl.textContent = "0.00s";
      btnPlay.disabled = false;
      btnStop.disabled = true;
    }

    btnPlay.addEventListener("click", startPlayback);
    btnStop.addEventListener("click", stopPlayback);

    buildLyrics();
  </script>
</body>
</html>
